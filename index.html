<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Old Town Tactical</title>
    <meta
      http-equiv="refresh"
      content="0; url=./site/"
    />
    <script>
      const isLocalHost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1" ||
        window.location.hostname === "[::1]" ||
        window.location.port !== "";
      window.location.replace(isLocalHost ? "./app.html" : "./site/");
    </script>
  </head>
  <body>
    <p>
      Redirecting to the game...
      <a href="./site/">Open deployed build</a>
      <a href="./app.html">Open local app entry</a>
    </p>
  </body>
</html>
